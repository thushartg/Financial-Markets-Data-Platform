version: 2

models:
  - name: stg_stock_prices
    description: "Cleaned daily OHLCV stock prices from Yahoo Finance"
    columns:
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['SPY', 'AAPL', 'MSFT', 'TSLA', 'NVDA']

      - name: price_date
        description: "Trading date"
        tests:
          - not_null

      - name: close_price
        description: "Adjusted closing price"
        tests:
          - not_null

  - name: stg_macro_indicators
    description: "Cleaned macroeconomic indicators from FRED"
    columns:
      - name: series_id
        description: "FRED series identifier"
        tests:
          - not_null

      - name: observation_date
        description: "Date of macro observation"
        tests:
          - not_null

      - name: indicator_value
        description: "Numeric value of the indicator"
        tests:
          - not_null